<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browser-based modular synthesizer application" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="manifest" href="/manifest.json" />
    <title>Modular Synth</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/components.css" />
    <link rel="stylesheet" href="/src/styles/canvas.css" />
  </head>
  <body>
    <div id="app">
      <!-- Top Bar -->
      <div class="top-bar">
        <h1 class="text-lg font-semibold">Modular Synth</h1>
        <input
          type="text"
          id="patch-name"
          class="patch-name-input"
          value="Untitled Patch"
          placeholder="Patch name..."
        />
        <div class="top-bar-actions" style="margin-left: auto; display: flex; gap: 8px;">
          <button id="btn-new">New</button>
          <button id="btn-save">Save</button>
          <button id="btn-load">Load</button>
          <button id="btn-export">Export</button>
          <button id="btn-import">Import</button>
          <button id="btn-help">Help</button>
          <button id="btn-terms">Terms</button>
          <button id="btn-github">GitHub</button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Sidebar - Component Library -->
        <div class="sidebar">
          <div style="padding: 16px;">
            <h2 class="text-base font-semibold" style="margin-bottom: 16px;">Components</h2>

            <!-- Component Categories -->
            <div class="component-category">
              <h3 class="text-sm font-medium text-secondary" style="margin-bottom: 8px;">
                Generators
              </h3>
              <div class="component-list" id="generators-list">
                <!-- Components will be added here dynamically -->
              </div>
            </div>

            <div class="component-category" style="margin-top: 16px;">
              <h3 class="text-sm font-medium text-secondary" style="margin-bottom: 8px;">
                Processors
              </h3>
              <div class="component-list" id="processors-list">
                <!-- Components will be added here dynamically -->
              </div>
            </div>

            <div class="component-category" style="margin-top: 16px;">
              <h3 class="text-sm font-medium text-secondary" style="margin-bottom: 8px;">
                Effects
              </h3>
              <div class="component-list" id="effects-list">
                <!-- Components will be added here dynamically -->
              </div>
            </div>

            <div class="component-category" style="margin-top: 16px;">
              <h3 class="text-sm font-medium text-secondary" style="margin-bottom: 8px;">
                Utilities
              </h3>
              <div class="component-list" id="utilities-list">
                <!-- Components will be added here dynamically -->
              </div>
            </div>

            <div class="component-category" style="margin-top: 16px;">
              <h3 class="text-sm font-medium text-secondary" style="margin-bottom: 8px;">
                Analyzers
              </h3>
              <div class="component-list" id="analyzers-list">
                <!-- Components will be added here dynamically -->
              </div>
            </div>
          </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-container">
          <canvas id="synth-canvas"></canvas>
          <div class="canvas-controls" id="canvas-controls">
            <button class="zoom-btn" id="zoom-out-btn" title="Zoom Out (-)">−</button>
            <input type="range" id="zoom-slider" min="50" max="200" value="100" title="Zoom Level">
            <button class="zoom-btn" id="zoom-in-btn" title="Zoom In (+)">+</button>
            <span class="zoom-label" id="zoom-label">100%</span>
            <span class="canvas-info-text" id="canvas-info">Pan: 0, 0 | Snap: ON</span>
          </div>
        </div>
      </div>

      <!-- Keyboard Section -->
      <div class="keyboard-section">
        <div id="keyboard-container">
          <canvas id="keyboard-canvas"></canvas>
        </div>
        <div style="margin-top: 12px; display: flex; gap: 8px; align-items: center;">
          <button id="btn-octave-down">Octave -</button>
          <span id="octave-display" class="text-sm">Octave: C3</span>
          <button id="btn-octave-up">Octave +</button>
          <button id="btn-panic" style="margin-left: 16px; background-color: var(--color-error);">
            Panic (Stop All)
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
